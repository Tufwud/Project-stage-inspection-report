<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Metallic Gradient -->
    <linearGradient id="goldGradientFavicon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab8236" />
      <stop offset="30%" stop-color="#fdf2a9" />
      <stop offset="50%" stop-color="#c5a059" />
      <stop offset="70%" stop-color="#fef8cc" />
      <stop offset="100%" stop-color="#8a5c1e" />
    </linearGradient>

    <!-- Wood Texture / Brown Gradient for main text -->
    <linearGradient id="woodGradientFavicon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8432a" />
      <stop offset="100%" stop-color="#551a0d" />
    </linearGradient>

    <!-- Top Text Path -->
    <path id="textArcTopFav" d="M 23,100 A 77,77 0 1,1 177,100" fill="none" />
    <!-- Bottom Text Path -->
    <path id="textArcBottomFav" d="M 23,100 A 77,77 0 0,0 177,100" fill="none" />
  </defs>

  <!-- Base Terracotta Circle Background (No outer square rect, so it fits round-tab frames beautifully) -->
  <circle cx="100" cy="100" r="98" fill="#a14730" />

  <!-- Gold Ring -->
  <circle cx="100" cy="100" r="76" fill="#ffffff" stroke="url(#goldGradientFavicon)" stroke-width="17" />

  <!-- Top Curved Text: CHOOSE INSULATED -->
  <text font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="9.8" fill="#1b2530" letter-spacing="2.2">
    <textPath href="#textArcTopFav" startOffset="50%" text-anchor="middle">CHOOSE INSULATED</textPath>
  </text>

  <!-- Bottom Curved Text: CHOOSE TUFWUD -->
  <text font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="9.8" fill="#1b2530" letter-spacing="2.2">
    <textPath href="#textArcBottomFav" startOffset="50%" text-anchor="middle">CHOOSE TUFWUD</textPath>
  </text>

  <!-- Stylized central 'tufwud' text drawing -->
  <g>
    <text x="100" y="113" font-family="'Impact', 'Arial Black', sans-serif" font-size="37" font-weight="900" fill="url(#woodGradientFavicon)" stroke="#3e1007" stroke-width="0.8" text-anchor="middle" letter-spacing="-0.5">tufwud</text>
    
    <!-- Registered TM Symbol ® -->
    <text x="156" y="90" font-family="'Georgia', 'Times New Roman', serif" font-weight="bold" font-size="10" fill="url(#woodGradientFavicon)">®</text>
  </g>
</svg>
