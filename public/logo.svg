<svg viewBox="0 0 200 200" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gold Metallic Gradient -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ab8236" />
      <stop offset="30%" stop-color="#fdf2a9" />
      <stop offset="50%" stop-color="#c5a059" />
      <stop offset="70%" stop-color="#fef8cc" />
      <stop offset="100%" stop-color="#8a5c1e" />
    </linearGradient>

    <!-- Wood Texture / Brown Gradient for main text -->
    <linearGradient id="woodGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a8432a" />
      <stop offset="50%" stop-color="#802e1a" />
      <stop offset="100%" stop-color="#551a0d" />
    </linearGradient>

    <!-- Drop shadow filter for professional 3D layering -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <!-- Top Text Path (clockwise along upper arc) -->
    <path id="textArcTop" d="M 23,100 A 77,77 0 1,1 177,100" fill="none" />
    <!-- Bottom Text Path (counter-clockwise along lower arc to keep text upright left-to-right) -->
    <path id="textArcBottom" d="M 23,100 A 77,77 0 0,0 177,100" fill="none" />
  </defs>

  <!-- Base Terracotta Outer Background -->
  <rect width="200" height="200" rx="44" fill="#a14730" />

  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="94" fill="#a14730" />

  <!-- Gold Ring (The shiny gold border containing the text, white filled center) -->
  <circle cx="100" cy="100" r="76" fill="#ffffff" stroke="url(#goldGradient)" stroke-width="17" filter="url(#shadow)" />

  <!-- Top Curved Text: CHOOSE INSULATED -->
  <text font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="9.8" fill="#1b2530" letter-spacing="2.2">
    <textPath href="#textArcTop" startOffset="50%" text-anchor="middle">CHOOSE INSULATED</textPath>
  </text>

  <!-- Bottom Curved Text: CHOOSE TUFWUD -->
  <text font-family="'Georgia', 'Times New Roman', serif" font-weight="900" font-size="9.8" fill="#1b2530" letter-spacing="2.2">
    <textPath href="#textArcBottom" startOffset="50%" text-anchor="middle">CHOOSE TUFWUD</textPath>
  </text>

  <!-- Stylized central 'tufwud' text drawing -->
  <g filter="url(#shadow)">
    <text x="100" y="113" font-family="'Impact', 'Arial Black', sans-serif" font-size="37" font-weight="900" fill="url(#woodGradient)" stroke="#3e1007" stroke-width="0.8" text-anchor="middle" letter-spacing="-0.5">tufwud</text>
    
    <!-- Wooden grain horizontal accent lines on text -->
    <line x1="52" y1="102" x2="148" y2="102" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="10 6 3 6" />
    <line x1="55" y1="110" x2="145" y2="110" stroke="#3e1007" stroke-width="0.4" stroke-opacity="0.3" stroke-dasharray="2 4 8 2" />

    <!-- Registered TM Symbol ® -->
    <text x="156" y="90" font-family="'Georgia', 'Times New Roman', serif" font-weight="bold" font-size="10" fill="url(#woodGradient)">®</text>
  </g>
</svg>
